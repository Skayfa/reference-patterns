# Every typescript/<category>/<slug> dir with a package.json is a workspace
# package. Versions live in the catalog: bump here, then ./scripts/test-all.sh
# re-verifies every pattern at once.
packages:
  - typescript/*/*
  - fullstack/*/*/web
  - fullstack/*/*/verifier-ts
  - fullstack/*/*/e2e
