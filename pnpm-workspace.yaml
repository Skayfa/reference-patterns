# Every typescript/<category>/<slug> dir with a package.json is a workspace
# package. Versions live in the catalog: bump here, then ./scripts/test-all.sh
# re-verifies every pattern at once.
packages:
  - typescript/*/*
catalog:
  "@testing-library/jest-dom": ^6.6.0
  "@testing-library/react": ^16.3.0
  "@testing-library/user-event": ^14.6.0
  "@types/react": ^19.2.0
  "@types/react-dom": ^19.2.0
  jsdom: ^29.0.0
  react: ^19.2.0
  react-call: ^2.0.2
  react-dom: ^19.2.0
  typescript: ^5.7.0
  vitest: ^4.1.0
